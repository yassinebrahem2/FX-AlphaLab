version: "3.9"

services:
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: fx_alphalab_db
    restart: always
    environment:
      POSTGRES_DB: fx_alphalab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fx_alphalab_app
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: fx_alphalab
      DB_USER: postgres
      DB_PASSWORD: postgres
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  postgres_data:
  app_logs:
